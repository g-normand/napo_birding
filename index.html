<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aves de Napo</title>
  <link rel="icon" href="files/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:   #1a2e1a;
      --moss:     #2d4a2d;
      --fern:     #3d6b3d;
      --sage:     #7a9e6e;
      --parchment:#f5eedc;
      --cream:    #faf6ed;
      --ink:      #1c1c14;
      --amber:    #c9843a;
      --gold:     #e8b84b;
      --mist:     rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      background: var(--forest);
      color: var(--parchment);
      font-family: 'Source Serif 4', Georgia, serif;
      overflow: hidden;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(61,107,61,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 75%, rgba(45,74,45,.4) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating feather decorations ── */
    .feather {
      position: fixed;
      opacity: 0.44;
      pointer-events: none;
      z-index: 0;
      font-size: 120px;
      user-select: none;
    }
    .feather-1 { top: -20px;  right: 5%;  transform: rotate(25deg);  font-size: 180px; }
    .feather-2 { bottom: 10%; left: -2%;  transform: rotate(-15deg); font-size: 140px; opacity: 0.03; }

    /* ── Layout ── */
    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 40px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 18px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--cream);
      line-height: 1;
    }

    .subtitle {
      font-style: italic;
      font-size: 0.95rem;
      color: var(--sage);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .divider {
      margin-top: 20px;
      height: 1px;
      background: linear-gradient(90deg, var(--fern) 0%, transparent 80%);
    }

    /* ── Tabs ── */
    nav {
      padding: 0 40px;
      display: flex;
      gap: 0;
      margin-top: 0;
      position: relative;
    }

    .tab {
      position: relative;
      cursor: pointer;
      padding: 14px 28px 12px;
      font-family: 'Source Serif 4', serif;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--sage);
      border: none;
      background: none;
      transition: color 0.25s ease;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: var(--gold);
      transition: left 0.3s ease, right 0.3s ease;
    }

    .tab:hover { color: var(--parchment); }

    .tab.active {
      color: var(--cream);
      font-weight: 600;
    }
    .tab.active::after {
      left: 16px;
      right: 16px;
    }

    /* tab icon */
    .tab-icon {
      display: inline-block;
      margin-right: 6px;
      font-size: 1em;
      vertical-align: -1px;
    }

    /* ── Content area ── */
    .content {
      position: relative;
      margin: 0 40px 32px;
      border: 1px solid rgba(122,158,110,0.2);
      border-radius: 4px;
      overflow: hidden;
      background: var(--cream);
    }

    /* slide panel */
    .panel {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateX(24px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      background: var(--cream);
    }

    .panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .panel.exit {
      opacity: 0;
      transform: translateX(-24px);
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Loading state ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: var(--cream);
      color: var(--moss);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: opacity 0.3s ease;
    }

    .loader.hidden { opacity: 0; pointer-events: none; }

    .bird-anim {
      font-size: 2.2rem;
      animation: soar 1.8s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes soar {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-10px) rotate(3deg); }
    }

    /* ── Status bar ── */
    .statusbar {
      grid-row: 3;
      padding: 6px 40px;
      font-size: 0.75rem;
      color: rgba(122,158,110,0.6);
      letter-spacing: 0.05em;
      display: flex;
      gap: 24px;
      border-top: 1px solid rgba(122,158,110,0.1);
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Welcome screen ── */
    .welcome {
      position: absolute;
      inset: 0;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--moss);
      text-align: center;
      padding: 40px;
      transition: opacity 0.4s ease;
    }

    .welcome.hidden { opacity: 0; pointer-events: none; }

    .welcome-bird {
      font-size: 3.5rem;
      animation: float 3s ease-in-out infinite;
      display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--forest);
      margin-top: 8px;
    }

    .welcome p {
      font-size: 0.9rem;
      color: var(--fern);
      max-width: 280px;
      line-height: 1.6;
      font-weight: 300;
    }

    .welcome .arrow {
      margin-top: 12px;
      font-size: 1.2rem;
      color: var(--amber);
      animation: bounce 1.5s ease-in-out infinite;
    }

    .zozio {
      height: 16px;
    }
    .zozio:hover {
      filter: invert(46%) sepia(92%) saturate(491%) hue-rotate(49deg) brightness(97%) contrast(102%);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<div class="feather feather-1">🪶</div>
<div class="feather feather-2">🪶</div>

<div class="shell">

  <header>
    <div class="header-top">
      <h1>Aves de Napo</h1>
      <div class="d-flex bg-dark text-light align-items-center px-3 py-2 w-100 justify-content-between">
          <a href="https://guiguide.alwaysdata.net/" target="_blank" title="guiguide.alwaysdata.net"
            ><img src="files/logo_guiguide.svg" class="zozio"></img>
          </a>
      </div>
    </div>
    <div class="divider"></div>

    <nav id="tabs">
      <button class="tab" data-src="dist/lista_guango.html" data-label="Guía Guango">
        <span class="tab-icon">🌿</span>Lista Guango
      </button>
    </nav>
  </header>

  <div class="content" id="content">

    <!-- Welcome splash -->
    <div class="welcome" id="welcome">
      <span class="welcome-bird">🦜</span>
      <h2>Selecciona una lista</h2>
      <p>Comparativas de campo entre guías locales y observaciones eBird en Napo.</p>
      <div class="arrow">↑</div>
    </div>

    <!-- Panels injected by JS -->
  </div>
</div>

<script>
  const tabs    = document.querySelectorAll('.tab');
  const content = document.getElementById('content');
  const welcome = document.getElementById('welcome');
  const statusInfo = document.getElementById('status-info');
  const VERSION = '2026_05_19';
  // Cache of panels already created
  const panels = {};
  let activeTab = null;

  function makePanel(src) {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.dataset.src = src;

    const loader = document.createElement('div');
    loader.className = 'loader';
    loader.innerHTML = `<span class="bird-anim">🐦</span><span>Cargando…</span>`;

    const iframe = document.createElement('iframe');
    iframe.src = `${src}?v=${VERSION}`;
    iframe.onload = () => {
      loader.classList.add('hidden');
    };

    panel.appendChild(loader);
    panel.appendChild(iframe);
    content.appendChild(panel);
    return panel;
  }

  function switchTo(tab) {
    if (tab === activeTab) return;

    const src   = tab.dataset.src;
    const label = tab.dataset.label;

    // Hide welcome
    welcome.classList.add('hidden');

    // Deactivate old tab and panel
    if (activeTab) {
      activeTab.classList.remove('active');
      const oldPanel = panels[activeTab.dataset.src];
      if (oldPanel) {
        oldPanel.classList.remove('active');
        oldPanel.classList.add('exit');
        // clean up exit class after animation
        setTimeout(() => oldPanel.classList.remove('exit'), 380);
      }
    }

    // Activate new tab
    tab.classList.add('active');
    activeTab = tab;

    // Create panel on first visit
    if (!panels[src]) {
      panels[src] = makePanel(src);
    }

    // Slight delay so exit animation starts first
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        panels[src].classList.add('active');
      });
    });

    statusInfo.textContent = `Mostrando: ${label}`;
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => switchTo(tab));
  });

  // Keyboard navigation between tabs
  document.addEventListener('keydown', e => {
    const all   = [...tabs];
    const idx   = all.indexOf(activeTab);
    if (e.key === 'ArrowRight' && idx < all.length - 1) switchTo(all[idx + 1]);
    if (e.key === 'ArrowLeft'  && idx > 0)              switchTo(all[idx - 1]);
  });
</script>
</body>
</html>
